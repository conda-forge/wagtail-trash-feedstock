{% set name = "wagtail-trash" %}
{% set version = "3.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 3644aa27ba905690d63972a6c7ddee2e363d535fdb723b6ca497918d68c9e733

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - wheel
    - pip
    - setuptools
  run:
    - django
    - django-treebeard
    - python >={{ python_min }}
    - wagtail >=6.3
    - wagtail-modeladmin

test:
  imports:
    - wagtail_trash
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Make deleted pages only temporarily deleted.
  home: https://github.com/Frojd/wagtail-trash/
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
